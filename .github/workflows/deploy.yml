name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (GitHub Actions source) if it isn't already,
          # so the first run doesn't fail with "Get Pages site failed".
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Static site lives at the repo root.
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
